<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>freeflow</title>
<!-- PDF.js for PDF rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module" id="pdfjs-script"></script>
<script>
// Load PDF.js dynamically so it works in both browser and Tauri
window._pdfJsReady = import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs').then(mod => {
  const pdfjsLib = mod;
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
  window.pdfjsLib = pdfjsLib;
  return pdfjsLib;
});
</script>
<!-- Fonts bundled locally -->
<link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- Dashboard view — populated by Svelte (src/main.js mounts Dashboard.svelte here) -->
<div id="view-dashboard"></div>

<!-- ══════════════════════════════════════════
     CANVAS VIEW
══════════════════════════════════════════ -->
<div id="dash-backdrop" onclick="toggleDashboard()" style="
  position:fixed;inset:0;z-index:4999;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
"></div>
<div id="view-canvas">

  <div id="dot-grid"></div>

  <!-- Svelte Pixi canvas + toolbar mounts (Phase 5) -->
  <div id="pixi-canvas-mount" style="position:absolute;inset:0;z-index:0;"></div>
  <div id="svelte-toolbar-mount"></div>
  <div id="svelte-canvas-bar-mount" style="position:fixed;top:0;left:0;right:0;z-index:1100;pointer-events:none;"></div>
  <div id="svelte-selection-bar-mount"></div>
  <div id="svelte-status-bar-mount"></div>
  <div id="svelte-minimap-mount"></div>
  <div id="svelte-cmd-palette-mount"></div>

  <div id="bar" data-tauri-drag-region>
    <div id="bar-left">
      <button id="back-btn" onclick="goToDashboard()" title="dashboard  ⌘\">
        <svg viewBox="0 0 13 13"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="7" y="1" width="5" height="5" rx="1"/><rect x="1" y="7" width="5" height="5" rx="1"/><rect x="7" y="7" width="5" height="5" rx="1"/></svg>
      </button>
      <span id="project-title" title="double-click to rename">untitled</span>
      <input id="project-title-input" type="text" spellcheck="false" />
    </div>
    <div id="bar-center">
      <button class="bar-btn" id="undo-btn" onclick="undo()" disabled>
        <svg viewBox="0 0 12 12"><path d="M2 6a4 4 0 104 4"/><polyline points="2,3 2,6 5,6"/></svg>
      </button>
      <button class="bar-btn" id="redo-btn" onclick="redo()" disabled>
        <svg viewBox="0 0 12 12"><path d="M10 6a4 4 0 10-4 4"/><polyline points="10,3 10,6 7,6"/></svg>
      </button>
      <div class="sep" style="height:16px;margin:0 2px;"></div>
      <button class="bar-btn" onclick="toggleSearch()"><svg viewBox="0 0 12 12"><circle cx="5" cy="5" r="3.5"/><line x1="7.5" y1="7.5" x2="11" y2="11"/></svg></button>
      <button class="bar-btn" onclick="zoomToFit()" title="Zoom to fit  0"><svg viewBox="0 0 12 12"><polyline points="1,4 1,1 4,1"/><polyline points="8,1 11,1 11,4"/><polyline points="11,8 11,11 8,11"/><polyline points="4,11 1,11 1,8"/></svg></button>
      <button class="bar-btn" onclick="zoomToSelection()" title="Zoom to selection  Ctrl+Shift+F"><svg viewBox="0 0 12 12"><polyline points="1,4 1,1 4,1"/><polyline points="8,1 11,1 11,4"/><polyline points="11,8 11,11 8,11"/><polyline points="4,11 1,11 1,8"/><rect x="3.5" y="3.5" width="5" height="5" rx="0.5" stroke-dasharray="1.5,1"/></svg></button>
      <button class="bar-btn" onclick="toggleMinimap()" title="Minimap"><svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5"/><rect x="3" y="3" width="3" height="2"/><rect x="7" y="4" width="2" height="4"/><rect x="3" y="7" width="4" height="2"/></svg></button>
      <button class="bar-btn" onclick="toggleBookmarkPanel()" title="Viewport bookmarks"><svg viewBox="0 0 12 12"><path d="M2 1h8v10L6 8.5 2 11z"/></svg></button>
      <button class="bar-btn" onclick="toggleTimer()"><svg viewBox="0 0 12 12"><circle cx="6" cy="7" r="4"/><line x1="6" y1="1" x2="6" y2="3"/><line x1="4" y1="1" x2="8" y2="1"/><line x1="6" y1="7" x2="8.5" y2="5"/></svg></button>
      <button class="bar-btn" id="always-on-top-btn" onclick="toggleAlwaysOnTop()" title="Always on top"><svg viewBox="0 0 12 12"><polyline points="6,1 6,9"/><polyline points="3,4 6,1 9,4"/><line x1="2" y1="11" x2="10" y2="11"/></svg></button>
    </div>
    <div id="bar-right">
      <button class="bar-btn" onclick="clearAll()">clear</button>
      <button class="bar-btn" id="import-btn" onclick="toggleImportPanel(event)">↑ import</button>
      <button class="bar-btn" onclick="summariseCanvas()">✦ summarise</button>
      <button class="bar-btn" onclick="openExportPanel()">↑ export</button>
      <button class="bar-btn" id="save-file-btn" onclick="saveCanvasToFile()" title="Save canvas to a file on disk">↓ save file</button>
      <button class="bar-btn" id="proj-dir-btn" onclick="pickProjectDir()" title="Set project directory for file operations">📁 project dir</button>
      <button class="bar-btn" onclick="openProjectDirInExplorer()" title="Open project folder in file explorer">↗ open folder</button>
      <button class="bar-btn" onclick="exportSharedCanvas()" title="Export self-contained canvas (all media bundled inline)">⬡ share</button>
      <button class="bar-btn" id="canvas-update-btn" onclick="if(window.checkForAppUpdate)checkForAppUpdate(false)" style="display:none;background:rgba(232,68,10,0.15);color:#E8440A;border:1px solid rgba(232,68,10,0.3);">↑ update</button>
      <div id="win-controls" style="display:none;margin-left:12px;gap:1px;align-items:center;">
        <button class="win-ctrl" id="win-min" title="Minimize">─</button>
        <button class="win-ctrl" id="win-max" title="Maximize">□</button>
        <button class="win-ctrl win-close" id="win-close" title="Close">✕</button>
      </div>
    </div>
  </div>

  <!-- search → SearchBox.svelte -->

  <!-- timer → TimerPanel.svelte -->

  <!-- command palette → CommandPalette.svelte (mounted at #svelte-cmd-palette-mount) -->

  <!-- toolbar → Toolbar.svelte (mounted at #svelte-toolbar-mount) -->

  <!-- selection bar → SelectionBar.svelte (mounted at #svelte-selection-bar-mount) -->

  <!-- note-menu, frame-menu, radial-menu → Canvas.svelte (built-in ctxMenu)
       minimap → Minimap.svelte
       bookmark-panel → BookmarkPanel.svelte
       search-box → SearchBox.svelte
       clear-confirm → ClearConfirm.svelte
       status bar → StatusBar.svelte (mounted at #svelte-status-bar-mount) -->

  <div id="cv">
    <div id="world">
      <div id="marquee"></div>
      <svg id="ink" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M1,1.5 L7,4 L1,6.5" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </marker>
          <marker id="rel-ah" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
            <path d="M1,1.5 L7,4 L1,6.5" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </marker>
        </defs>
        <g id="relations"></g>
        <g id="strokes"></g>
        <g id="arrows"></g>
      </svg>
    </div>
  </div>

  <!-- status bar → StatusBar.svelte (mounted at #svelte-status-bar-mount) -->

  <!-- Import panel, drop handling, timer → Svelte (ImportPanel.svelte, MediaDropHandler.svelte, TimerPanel.svelte) -->

  <!-- brainstorm panel → BrainstormPanel.svelte -->

  <svg id="rel-drag-svg" style="display:none"><path id="rel-drag-path" d=""/></svg>
<svg id="conn-wire-svg" style="display:none"><path id="conn-wire-path" d=""/></svg>
</div><!-- /view-canvas -->

<!-- Summary panel -->
<div id="summary-panel">
  <div id="summary-header">
    <span id="summary-title">✦ CANVAS SUMMARY</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="summary-icon-btn" onclick="copySummary()" title="Copy summary">
        <svg viewBox="0 0 14 14"><rect x="4" y="4" width="8" height="9" rx="1"/><path d="M2 10V2a1 1 0 011-1h7"/></svg>
      </button>
      <button class="summary-icon-btn" onclick="addSummaryAsNote()" title="Add as note">
        <svg viewBox="0 0 14 14"><rect x="2" y="2" width="10" height="10" rx="1.5"/><line x1="7" y1="5" x2="7" y2="9"/><line x1="5" y1="7" x2="9" y2="7"/></svg>
      </button>
      <button class="summary-icon-btn" onclick="closeSummary()" title="Close" style="margin-left:2px;">
        <svg viewBox="0 0 14 14"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
      </button>
    </div>
  </div>
  <div id="summary-body">
    <div id="summary-content"></div>
  </div>
</div>

<!-- Export panel -->
<div id="export-panel">
  <div id="export-header">
    <span id="export-title">↑ EXPORT</span>
    <button class="summary-icon-btn" onclick="closeExportPanel()" title="Close">
      <svg viewBox="0 0 14 14"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
    </button>
  </div>
  <div id="export-body">
    <div class="export-option" onclick="exportPNG()">
      <div class="export-option-icon">
        <svg viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="2"/><circle cx="7" cy="7" r="2"/><polyline points="2,14 6,10 9,13 13,8 18,14"/></svg>
      </div>
      <div class="export-option-info">
        <div class="export-option-name">PNG Image</div>
        <div class="export-option-desc">Full canvas as a high-res image</div>
      </div>
      <div class="export-option-arrow">→</div>
    </div>
    <div class="export-option" onclick="exportJSON()">
      <div class="export-option-icon">
        <svg viewBox="0 0 20 20"><polyline points="7,2 2,2 2,18 18,18 18,2 13,2"/><line x1="6" y1="8" x2="14" y2="8"/><line x1="6" y1="11" x2="14" y2="11"/><line x1="6" y1="14" x2="10" y2="14"/></svg>
      </div>
      <div class="export-option-info">
        <div class="export-option-name">JSON Data</div>
        <div class="export-option-desc">All notes, frames, labels as structured data</div>
      </div>
      <div class="export-option-arrow">→</div>
    </div>
    <div class="export-option" onclick="exportMarkdown()">
      <div class="export-option-icon">
        <svg viewBox="0 0 20 20"><rect x="2" y="4" width="16" height="12" rx="2"/><line x1="5" y1="8" x2="5" y2="12"/><polyline points="5,8 7,11 9,8"/><line x1="9" y1="8" x2="9" y2="12"/><line x1="12" y1="12" x2="12" y2="8 "/><line x1="12" y1="8" x2="15" y2="8"/><line x1="12" y1="10" x2="14" y2="10"/></svg>
      </div>
      <div class="export-option-info">
        <div class="export-option-name">Markdown</div>
        <div class="export-option-desc">Notes and labels as a readable doc</div>
      </div>
      <div class="export-option-arrow">→</div>
    </div>
  </div>
</div>

<div id="toast"></div>



<!-- ══════════════════════════════════════════
     STROKE / SHAPE RIGHT-CLICK CONTEXT MENU
══════════════════════════════════════════ -->
<div id="stroke-ctx-menu">
  <!-- Stroke color -->
  <div class="sctx-section-label">Stroke</div>
  <div class="sctx-row sctx-colors" id="sctx-stroke-colors">
    <button class="sctx-color-dot" data-color="#000000" style="background:#000000" title="Black"></button>
    <button class="sctx-color-dot" data-color="#e03131" style="background:#e03131" title="Red"></button>
    <button class="sctx-color-dot" data-color="#2f9e44" style="background:#2f9e44" title="Green"></button>
    <button class="sctx-color-dot" data-color="#1971c2" style="background:#1971c2" title="Blue"></button>
    <button class="sctx-color-dot" data-color="#f08c00" style="background:#f08c00" title="Orange"></button>
    <button class="sctx-color-dot sctx-color-custom" id="sctx-stroke-custom" title="Custom color">
      <input type="color" id="sctx-stroke-color-input">
    </button>
  </div>
  <div class="ictx-sep"></div>
  <!-- Background / fill color -->
  <div class="sctx-section-label">Background</div>
  <div class="sctx-row sctx-colors" id="sctx-fill-colors">
    <button class="sctx-color-dot sctx-fill-none" data-fill="none" title="No fill">
      <svg viewBox="0 0 14 14" fill="none"><line x1="1" y1="13" x2="13" y2="1" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/><rect x="1" y="1" width="12" height="12" rx="2" stroke="rgba(255,255,255,0.15)" stroke-width="1"/></svg>
    </button>
    <button class="sctx-color-dot" data-fill="rgba(255,182,182,0.4)" style="background:rgba(255,182,182,0.4)" title="Pink"></button>
    <button class="sctx-color-dot" data-fill="rgba(180,242,180,0.4)" style="background:rgba(180,242,180,0.4)" title="Green"></button>
    <button class="sctx-color-dot" data-fill="rgba(173,216,255,0.4)" style="background:rgba(173,216,255,0.4)" title="Blue"></button>
    <button class="sctx-color-dot" data-fill="rgba(255,236,153,0.4)" style="background:rgba(255,236,153,0.4)" title="Yellow"></button>
    <button class="sctx-color-dot sctx-color-custom" id="sctx-fill-custom" title="Custom fill color">
      <input type="color" id="sctx-fill-color-input">
    </button>
  </div>
  <div class="ictx-sep"></div>
  <!-- Stroke width -->
  <div class="sctx-section-label">Stroke width</div>
  <div class="sctx-row sctx-option-row" id="sctx-stroke-widths">
    <button class="sctx-opt-btn" data-sw="1" title="Thin"><span class="sctx-sw-preview" style="height:1px"></span></button>
    <button class="sctx-opt-btn" data-sw="2" title="Medium"><span class="sctx-sw-preview" style="height:2px"></span></button>
    <button class="sctx-opt-btn" data-sw="4" title="Bold"><span class="sctx-sw-preview" style="height:4px"></span></button>
  </div>
  <div class="ictx-sep"></div>
  <!-- Stroke style -->
  <div class="sctx-section-label">Stroke style</div>
  <div class="sctx-row sctx-option-row" id="sctx-stroke-styles">
    <button class="sctx-opt-btn" data-dash="none" title="Solid"><svg viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    <button class="sctx-opt-btn" data-dash="dashed" title="Dashed"><svg viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 4"/></svg></button>
    <button class="sctx-opt-btn" data-dash="dotted" title="Dotted"><svg viewBox="0 0 36 10"><line x1="2" y1="5" x2="34" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="1.5 5"/></svg></button>
  </div>
  <div class="ictx-sep"></div>
  <!-- Opacity -->
  <div class="sctx-section-label">Opacity</div>
  <div class="sctx-row sctx-opacity-row">
    <span class="sctx-opacity-val" id="sctx-opacity-val">100</span>
    <input type="range" id="sctx-opacity" min="0" max="100" value="100" class="sctx-slider">
  </div>
  <div class="ictx-sep"></div>
  <!-- Zoom to -->
  <div class="ictx-item" id="sctx-zoom">
    <span class="ictx-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><polyline points="1,4.5 1,1 4.5,1"/><polyline points="9.5,1 13,1 13,4.5"/><polyline points="13,9.5 13,13 9.5,13"/><polyline points="4.5,13 1,13 1,9.5"/><rect x="4" y="4" width="6" height="6" rx="0.5" stroke-dasharray="1.5,1"/></svg></span>
    Zoom to
  </div>
  <div class="ictx-sep"></div>
  <!-- Delete -->
  <div class="ictx-item sctx-delete-item" id="sctx-delete">
    <span class="ictx-icon"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><polyline points="2,4 12,4"/><path d="M5 4V3h4v1"/><path d="M3 4l1 8h6l1-8"/></svg></span>
    Delete
  </div>
</div>


<script type="module" src="./main.js"></script>
</body>
</html>
